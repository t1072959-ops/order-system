<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>線上點餐</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Mono:wght@500;700&family=Noto+Sans+TC:wght@400;500;700&family=Noto+Serif+TC:wght@700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

<header class="chalkboard-header">
  <h1 id="storeName">店名載入中...</h1>
  <p id="storeNotice"></p>
</header>

<main class="layout">
  <section>
    <div class="category-tabs" id="categoryTabs"></div>
    <div id="menuContainer"></div>
  </section>

  <aside class="ticket" id="ticketPanel">
    <div class="ticket-inner">
      <h2><span>🧾 我的點餐單</span><span id="ticketCount">0 項</span></h2>
      <div id="ticketLines">
        <p class="ticket-empty">尚未選擇餐點</p>
      </div>
      <div class="ticket-total">
        <span>總計</span>
        <span id="ticketTotal">$0</span>
      </div>
      <textarea class="note-field" id="orderNote" rows="2" placeholder="備註(不要辣、加飯...等,選填)"></textarea>
      <button class="submit-btn" id="submitBtn" disabled>送出訂單</button>
      <div class="ticket-close" id="ticketCloseBtn">收起 ▾</div>
    </div>
  </aside>
</main>

<div class="mobile-ticket-bar" id="mobileTicketBar">
  <span id="mobileBarText">尚未選擇餐點</span>
  <button id="mobileBarOpen">查看點餐單</button>
</div>

<div class="stamp-overlay" id="stampOverlay">
  <div class="stamp-card">
    <div class="stamp-mark">已送出</div>
    <h3 id="orderNumberDisplay">A-01</h3>
    <p>訂單已送出,請留意店家叫號</p>
    <button id="stampCloseBtn">再點一次</button>
  </div>
</div>

<script src="js/menu.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="js/firebase-init.js"></script>
<script src="js/order.js"></script>
</body>
</html>
