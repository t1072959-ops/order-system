<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>店家後台 - 訂單看板</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Mono:wght@500;700&family=Noto+Sans+TC:wght@400;500;700&family=Noto+Serif+TC:wght@700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/style.css" />
</head>
<body class="admin-body">

<!-- 登入畫面 -->
<div class="center-screen" id="loginScreen">
  <div class="login-card">
    <h2>店家後台登入</h2>
    <div class="login-error" id="loginError"></div>
    <input type="password" id="passwordInput" placeholder="請輸入密碼" inputmode="numeric" />
    <button id="loginBtn">登入</button>
  </div>
</div>

<!-- 後台主畫面 -->
<div id="dashboard" style="display:none;">
  <div class="admin-header">
    <div>
      <h1 id="storeNameAdmin">訂單看板</h1>
      <div class="sub"><span class="status-dot"></span>即時連線中</div>
    </div>
    <div style="display:flex; gap:10px;">
      <button id="qrBtn" style="background:transparent;border:1px solid #f5f1e6;color:#f5f1e6;padding:8px 14px;border-radius:6px;">產生點餐 QR Code</button>
      <button id="logoutBtn" style="background:transparent;border:1px solid #f5f1e6;color:#f5f1e6;padding:8px 14px;border-radius:6px;">登出</button>
    </div>
  </div>

  <div class="order-rail" id="orderRail">
    <p class="empty-state">目前沒有訂單,等待客人點餐中...</p>
  </div>
</div>

<!-- QR Code 彈出視窗 -->
<div class="stamp-overlay" id="qrOverlay">
  <div class="qr-card">
    <h2>掃碼即可點餐</h2>
    <div id="qrcode"></div>
    <div class="url-box" id="qrUrl"></div>
    <a href="#" class="link-btn" id="qrCloseBtn">關閉</a>
  </div>
</div>

<script src="js/menu.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="js/firebase-init.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="js/admin.js"></script>
</body>
</html>
